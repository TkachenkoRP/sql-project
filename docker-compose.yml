services:
  postgres-db:
    image: postgres:18.1-alpine
    container_name: sql_project_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: db
    volumes:
    - postgres_data:/var/lib/postgresql/data
    - ./init-scripts:/docker-entrypoint-initdb.d
    - ./vehicles:/sql-test/vehicles
    - ./racing:/sql-test/racing
    - ./hotel:/sql-test/hotel
    - ./organization:/sql-test/organization

volumes:
  postgres_data: